<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>City Tour - Montenegro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        #panorama { width: 100%; height: 100vh; }
        body { margin: 0; }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
pannellum.viewer('panorama', {   
    "default": {
        "firstScene": "main",
        "author": "Yacht Project",
        "autoLoad": true
    },

    "scenes": {
        "main": {
            "title": "Набережная Бара",
            "type": "equirectangular",
            "panorama": "center.jpg", 
            "hotSpots": [
                {
                    "pitch": -10.0, // ЗАМЕНИТЕ на ваши цифры из консоли Chrome
                    "yaw": 45.0,    // ЗАМЕНИТЕ на ваши цифры из консоли Chrome
                    "type": "scene",
                    "text": "Перейти в Парк 🌳",
                    "sceneId": "park" // ID сцены, куда переходим
                }
            ]
        },

        "park": {
            "title": "Городской парк",
            "type": "equirectangular",
            "panorama": "park.jpg",
            "hotSpots": [
                {
                    "pitch": -5.0,
                    "yaw": 120.0,
                    "type": "scene",
                    "text": "Вернуться на набережную 🏙️",
                    "sceneId": "main"
                }
            ]
        }
    }
});
</script>

</body>
</html>
