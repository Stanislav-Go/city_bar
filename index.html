<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>City Tour - Bar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        #panorama { width: 100%; height: 100vh; }
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #000; }

        /* Кнопка звука */
        #mute-button {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
            font-size: 24px;
            -webkit-tap-highlight-color: transparent;
        }

        .custom-hotspot {
            height: 44px; width: 44px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
        }

        .custom-hotspot::after {
            content: '➜';
            color: white;
            font-size: 20px;
            display: inline-block;
            transform: rotate(-90deg);
        }

        .custom-hotspot::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border: 2px solid #fff;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        .pnlm-tooltip span {
            background: rgba(0,0,0,0.8) !important;
            color: #fff !important;
            padding: 8px !important;
            border-radius: 4px !important;
        }
    </style>
</head>
<body>

<div id="mute-button">🔇</div>

<audio id="bg-music" loop playsinline preload="auto">
    <source src="background.mp3" type="audio/mpeg">
</audio>

<div id="panorama"></div>

<script>
var music = document.getElementById('bg-music');
var muteBtn = document.getElementById('mute-button');

muteBtn.addEventListener('click', function() {
    if (music.paused) {
        music.play();
        muteBtn.innerHTML = '🔊';
        muteBtn.style.backgroundColor = 'rgba(0, 150, 0, 0.7)';
    } else {
        music.pause();
        muteBtn.innerHTML = '🔇';
        muteBtn.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
    }
}, false);

function hotspotTooltip(hotSpotDiv, args) {
    hotSpotDiv.classList.add('pnlm-tooltip');
    var span = document.createElement('span');
    span.innerHTML = args;
    hotSpotDiv.appendChild(span);
}

var viewer = pannellum.viewer('panorama', {   
    "default": {
        "firstScene": "main",
        "autoLoad": true,
        "sceneFadeDuration": 1000,
        "multiResMinReader": true,
        "hotSpotDebug": true // ВКЛЮЧЕНО: теперь прицел виден и координаты пишутся в консоль
    },
    "scenes": {
        "main": {
            "title": "Центр Бара",
            "type": "equirectangular",
            "panorama": "center.jpg", 
            "hotSpots": [
                {
                    "pitch": 0.3885324428650547, 
                    "yaw": 179.72898081599294,    
                    "cssClass": "custom-hotspot",
                    "createTooltipFunc": hotspotTooltip,
                    "createTooltipArgs": "Stari Grad Bar",
                    "clickHandlerFunc": function() { viewer.loadScene("park"); }
                }
            ]
        },
        "park": {
            "title": "Наш дом",
            "type": "equirectangular",
            "panorama": "park.jpg",
            "hotSpots": [
                {
                    "pitch": -4.95,
                    "yaw": 173.3,
                    "cssClass": "custom-hotspot",
                    "createTooltipFunc": hotspotTooltip,
                    "createTooltipArgs": "Center",
                    "clickHandlerFunc": function() { viewer.loadScene("main"); }
                }
            ]
        }
    }
});
</script>
