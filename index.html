<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>City Tour - Bar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        #panorama { width: 100%; height: 100vh; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
pannellum.viewer('panorama', {   
    "default": {
        "firstScene": "main",
        "autoLoad": true,
        "hotSpotDebug": true, // ЭТА СТРОЧКА ВКЛЮЧАЕТ КООРДИНАТЫ В КОНСОЛИ
        "sceneFadeDuration": 1000
    },
    "scenes": {
        "main": {
            "title": "Центр Бара",
            "type": "equirectangular",
            "panorama": "center.jpg", 
            "hotSpots": [
                {
                    "pitch": -7.3, 
                    "yaw": 169,    
                    "type": "scene",
                    "text": "Наш дом 🏠",
                    "sceneId": "park"
                }
            ]
        },
        "park": {
            "title": "Наш дом",
            "type": "equirectangular",
            "panorama": "park.jpg",
            "hotSpots": [
                {
                    "pitch": -4.95,
                    "yaw": 173.3,
                    "type": "scene",
                    "text": "Вернуться в центр 🏙️",
                    "sceneId": "main"
                }
            ]
        }
    }
});
</script>

</body>
</html>
