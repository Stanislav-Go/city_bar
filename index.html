<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>City Tour - Bar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #000;
        }

        #panorama {
            width: 100%;
            height: 100vh;
        }

        /* ── ПРЕЛОАДЕР ── */
        #preloader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }

        #preloader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-ring {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255,255,255,0.15);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        .loader-text {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── КНОПКА ЗВУКА ── */
        #mute-button {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid rgba(255,255,255,0.5);
            font-size: 22px;
            transition: background 0.25s, transform 0.15s;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        #mute-button:hover {
            background: rgba(0, 0, 0, 0.85);
            transform: scale(1.08);
        }

        #mute-button.playing {
            background: rgba(0, 130, 0, 0.7);
            border-color: rgba(255,255,255,0.7);
        }

        /* ── ХОТСПОТ ── */
        .custom-hotspot {
            height: 44px !important;
            width: 44px !important;
            background: rgba(255, 255, 255, 0.25) !important;
            border-radius: 50% !important;
            border: 2px solid rgba(255,255,255,0.85) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            transition: background 0.2s, transform 0.2s !important;
        }

        .custom-hotspot:hover {
            background: rgba(255, 255, 255, 0.45) !important;
            transform: scale(1.1) !important;
        }

        /* Стрелка */
        .custom-hotspot::after {
            content: '➜';
            color: white;
            font-size: 20px;
            transform: rotate(-90deg);
            display: block;
            pointer-events: none;
        }

        /* Пульсация */
        .custom-hotspot::before {
            content: '';
            position: absolute;
            width: 44px;
            height: 44px;
            border: 2px solid rgba(255,255,255,0.7);
            border-radius: 50%;
            animation: pulse 2s infinite;
            box-sizing: border-box;
            pointer-events: none;
        }

        @keyframes pulse {
            0%   { transform: scale(1);   opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }

        /* ── ТУЛТИП (исправлено центрирование) ── */
        .pnlm-tooltip span {
            position: absolute !important;
            bottom: 56px !important;
            left: 50% !important;
            transform: translateX(-50%) !important; /* ← правильное центрирование */
            width: max-content !important;
            max-width: 200px !important;

            background: rgba(0, 0, 0, 0.75) !important;
            backdrop-filter: blur(6px) !important;
            -webkit-backdrop-filter: blur(6px) !important;
            color: #fff !important;
            padding: 7px 12px !important;
            border-radius: 8px !important;
            font-size: 13px !important;
            text-align: center !important;
            white-space: nowrap !important;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4) !important;
            letter-spacing: 0.3px !important;

            visibility: visible !important;
            opacity: 1 !important;
            display: block !important;
            text-indent: 0 !important;

            /* Плавное появление */
            animation: fadeInLabel 0.3s ease !important;
        }

        @keyframes fadeInLabel {
            from { opacity: 0; transform: translateX(-50%) translateY(4px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Убираем треугольник */
        .pnlm-tooltip span::after {
            display: none !important;
        }

        /* ── АДАПТИВ ДЛЯ МОБИЛЬНЫХ ── */
        @media (max-width: 600px) {
            .custom-hotspot,
            .custom-hotspot::before {
                width: 52px !important;
                height: 52px !important;
            }

            .custom-hotspot::after {
                font-size: 24px;
            }

            #mute-button {
                width: 44px;
                height: 44px;
                font-size: 20px;
                top: 12px;
                right: 12px;
            }
        }
    </style>
</head>
<body>

<!-- Прелоадер -->
<div id="preloader">
    <div class="loader-ring"></div>
    <div class="loader-text">Загрузка</div>
</div>

<!-- Кнопка звука -->
<div id="mute-button" title="Звук">🔇</div>

<audio id="bg-music" loop playsinline preload="auto">
    <source src="background.mp3" type="audio/mpeg">
</audio>

<div id="panorama"></div>

<script>
    /* ── ЗВУК ── */
    var music  = document.getElementById('bg-music');
    var muteBtn = document.getElementById('mute-button');

    function setPlaying(playing) {
        if (playing) {
            music.play().catch(function(){});
            muteBtn.innerHTML = '🔊';
            muteBtn.classList.add('playing');
        } else {
            music.pause();
            muteBtn.innerHTML = '🔇';
            muteBtn.classList.remove('playing');
        }
    }

    muteBtn.addEventListener('click', function () {
        setPlaying(music.paused);
    });

    /* ── ТУЛТИП ── */
    function hotspotTooltip(hotSpotDiv, args) {
        hotSpotDiv.classList.add('pnlm-tooltip');
        var span = document.createElement('span');
        span.innerHTML = args;
        hotSpotDiv.appendChild(span);
    }

    /* ── PANNELLUM ── */
    var viewer = pannellum.viewer('panorama', {
        "default": {
            "firstScene": "main",
            "autoLoad": true,
            "sceneFadeDuration": 1000,
            "hotSpotDebug": false
        },
        "scenes": {
            "main": {
                "title": "Center",
                "panorama": "center.jpg",
                "hotSpots": [
                    {
                        "pitch": 0.3885,
                        "yaw": 179.7289,
                        "cssClass": "custom-hotspot",
                        "createTooltipFunc": hotspotTooltip,
                        "createTooltipArgs": "Stari Grad Bar",
                        "clickHandlerFunc": function () { viewer.loadScene("park"); }
                    }
                ]
            },
            "park": {
                "title": "Stari Grad Bar",
                "panorama": "park.jpg",
                "hotSpots": [
                    {
                        "pitch": 1.5412304198575402,
                        "yaw": 20.894830760941122,
                        "cssClass": "custom-hotspot",
                        "createTooltipFunc": hotspotTooltip,
                        "createTooltipArgs": "Center",
                        "clickHandlerFunc": function () { viewer.loadScene("main"); }
                    }
                ]
            }
        }
    });

    /* ── ПРЕЛОАДЕР: скрыть после загрузки ── */
    viewer.on('load', function () {
        var preloader = document.getElementById('preloader');
        preloader.classList.add('hidden');

        // Попытка автовоспроизведения после первого взаимодействия
        setTimeout(function () {
            music.play().then(function () {
                muteBtn.innerHTML = '🔊';
                muteBtn.classList.add('playing');
            }).catch(function () {
                // Браузер заблокировал — оставляем muted
            });
        }, 500);
    });
</script>
</body>
</html>
