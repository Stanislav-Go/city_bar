<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>City Tour - Bar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        #panorama { width: 100%; height: 100vh; }
        body { margin: 0; padding: 0; }

        /* Стиль анимированной точки */
        .custom-hotspot {
            height: 40px;
            width: 40px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        /* Символ стрелки внутри, развернутый вверх */
        .custom-hotspot::after {
            content: '➜'; /* Оставляем тот же символ */
            color: white;
            font-size: 18px;
            display: inline-block; /* Важно: чтобы поворот сработал */
            transform: rotate(-90deg); /* Поворачиваем на 90 градусов влево */
            text-shadow: 0 0 5px rgba(0,0,0,0.5); /* Добавляем тень для контраста */
        }

        /* Эффект пульсации */
        .custom-hotspot::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid #fff;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* Центрирование текста подсказки */
        .pnlm-tooltip span {
            margin-left: -50px; /* Сдвиг, чтобы текст был по центру */
            width: 100px;
            text-align: center;
            transform: translateY(-10px);
        }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
// Функция для создания подсказок у кастомных точек
function hotspotTooltip(hotSpotDiv, args) {
    hotSpotDiv.classList.add('pnlm-tooltip');
    var span = document.createElement('span');
    span.innerHTML = args;
    hotSpotDiv.appendChild(span);
}

var viewer = pannellum.viewer('panorama', {   
    "default": {
        "firstScene": "main",
        "autoLoad": true,
        "sceneFadeDuration": 1000
    },

    "scenes": {
        "main": {
            "title": "Центр Бара",
            "type": "equirectangular",
            "panorama": "center.jpg", 
            "hotSpots": [
                {
                    "pitch": -7.3, 
                    "yaw": 169,    
                    "cssClass": "custom-hotspot",
                    "createTooltipFunc": hotspotTooltip,
                    "createTooltipArgs": "Наш дом 🏠",
                    "clickHandlerFunc": function() {
                        viewer.loadScene("park");
                    }
                }
            ]
        },

        "park": {
            "title": "Наш дом",
            "type": "equirectangular",
            "panorama": "park.jpg",
            "hotSpots": [
                {
                    "pitch": -4.95,
                    "yaw": 173.3,
                    "cssClass": "custom-hotspot",
                    "createTooltipFunc": hotspotTooltip,
                    "createTooltipArgs": "Центр города 🏙️",
                    "clickHandlerFunc": function() {
                        viewer.loadScene("main");
                    }
                }
            ]
        }
    }
});
</script>

</body>
</html>
